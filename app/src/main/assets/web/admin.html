<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Frame - Admin Dashboard</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --bg: #0b0f19;
            --card-bg: rgba(22, 29, 49, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.03) 0%, transparent 40%);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            min-height: 100vh;
            padding: 30px 15px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Header styling */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--card-border);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: linear-gradient(135deg, var(--primary) 0%, #a5b4fc 100%);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 600;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-widget {
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
        }

        /* Upload Area styling */
        .upload-section {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            transition: border-color 0.3s ease;
        }

        .upload-section.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.08);
        }

        .upload-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 15px;
            display: inline-block;
        }

        .upload-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .upload-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .upload-btn {
            background: var(--primary);
            color: #ffffff;
            border: none;
            padding: 12px 30px;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
        }

        .upload-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .file-input {
            display: none;
        }

        /* Upload Queue Progress */
        .progress-container {
            margin-top: 25px;
            text-align: left;
            display: none;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .progress-bar-bg {
            background: rgba(255,255,255,0.05);
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .progress-bar-fill {
            background: linear-gradient(to right, var(--primary), #a5b4fc);
            width: 0%;
            height: 100%;
            border-radius: 10px;
            transition: width 0.1s ease;
        }

        /* Photo Grid section */
        .grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .grid-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.35rem;
            font-weight: 600;
        }

        .photo-count {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .photo-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            aspect-ratio: 4/3;
        }

        .photo-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
        }

        .photo-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-color: #050811;
        }

        /* Card overlay with delete button */
        .card-actions {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.6) 100%);
            opacity: 0;
            transition: opacity 0.25s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px;
        }

        .photo-card:hover .card-actions {
            opacity: 1;
        }

        .photo-name {
            font-size: 0.8rem;
            font-weight: 400;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .delete-btn {
            background: rgba(239, 68, 68, 0.9);
            color: #ffffff;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            align-self: flex-end;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
        }

        .delete-btn:hover {
            background: var(--danger-hover);
            transform: scale(1.08);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border: 1px dashed var(--card-border);
            border-radius: 16px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 2.5rem;
            color: var(--text-muted);
            opacity: 0.5;
            margin-bottom: 12px;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: rgba(20, 25, 45, 0.9);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(20px);
            opacity: 0;
            animation: toast-in 0.3s forwards;
            font-size: 0.9rem;
        }

        @keyframes toast-in {
            to { transform: translateY(0); opacity: 1; }
        }

        .toast.success { border-left: 4px solid #10b981; }
        .toast.error { border-left: 4px solid var(--danger); }
    </style>
</head>
<body>

    <div class="container">
        
        <header>
            <div class="logo-container">
                <div class="logo-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                </div>
                <h1>Photo Frame Manager</h1>
            </div>
            
            <div class="status-widget">
                <span class="status-dot"></span>
                <span>Frame Connected</span>
            </div>
        </header>

        <!-- Upload Dropzone -->
        <section class="upload-section" id="dropzone">
            <span class="upload-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
            </span>
            <h2 class="upload-title">Upload New Photos</h2>
            <p class="upload-text">Drag and drop images here, or click to browse files from your device</p>
            
            <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Browse Files</button>
            <input type="file" id="fileInput" class="file-input" multiple accept="image/*">
            
            <!-- Progress indicator -->
            <div class="progress-container" id="progressContainer">
                <div class="progress-info">
                    <span id="progressText">Uploading...</span>
                    <span id="progressPercentage">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBarFill"></div>
                </div>
            </div>
        </section>

        <!-- Gallery Grid -->
        <section>
            <div class="grid-header">
                <h2 class="grid-title">Photos on Frame</h2>
                <span class="photo-count" id="photoCount">0 photos</span>
            </div>
            
            <div class="photo-grid" id="photoGrid">
                <!-- Dynamically populated -->
            </div>
        </section>

    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // DOM Elements
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const photoGrid = document.getElementById('photoGrid');
        const photoCount = document.getElementById('photoCount');
        const progressContainer = document.getElementById('progressContainer');
        const progressText = document.getElementById('progressText');
        const progressBarFill = document.getElementById('progressBarFill');
        const progressPercentage = document.getElementById('progressPercentage');
        const toastContainer = document.getElementById('toastContainer');

        // Initial Load
        loadPhotos();

        // 1. Drag & Drop Event Listeners
        ['dragenter', 'dragover'].forEach(eventName => {
            dropzone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropzone.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropzone.classList.remove('dragover');
            }, false);
        });

        dropzone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }, false);

        fileInput.addEventListener('change', () => {
            handleFiles(fileInput.files);
        });

        // 2. Upload Logic
        function handleFiles(files) {
            const imageFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
            if (imageFiles.length === 0) {
                showToast("Please select image files only.", "error");
                return;
            }
            uploadFilesSeq(imageFiles);
        }

        async function uploadFilesSeq(files) {
            progressContainer.style.display = 'block';
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                progressText.textContent = `Uploading ${file.name} (${i + 1}/${files.length})...`;
                
                try {
                    await uploadFile(file);
                } catch (err) {
                    showToast(`Failed to upload ${file.name}: ${err.message}`, "error");
                }
            }
            
            // Finished
            setTimeout(() => {
                progressContainer.style.display = 'none';
                progressBarFill.style.width = '0%';
                progressPercentage.textContent = '0%';
                loadPhotos(); // Refresh grid
            }, 1000);
        }

        function uploadFile(file) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                const formData = new FormData();
                formData.append('file', file, file.name);

                xhr.open('POST', '/api/upload', true);

                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = Math.round((e.loaded / e.total) * 100);
                        progressBarFill.style.width = percent + '%';
                        progressPercentage.textContent = percent + '%';
                    }
                };

                xhr.onload = () => {
                    if (xhr.status === 200) {
                        showToast(`Successfully uploaded ${file.name}`, "success");
                        resolve();
                    } else {
                        reject(new Error(xhr.responseText || `Server returned ${xhr.status}`));
                    }
                };

                xhr.onerror = () => {
                    reject(new Error("Network connection error"));
                };

                xhr.send(formData);
            });
        }

        // 3. Grid Population & API Fetching
        async function loadPhotos() {
            try {
                const response = await fetch('/api/photos');
                if (!response.ok) throw new Error("Failed to load photo list");
                
                const photos = await response.json();
                photoCount.textContent = `${photos.length} photo${photos.length === 1 ? '' : 's'}`;
                
                if (photos.length === 0) {
                    photoGrid.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                    <line x1="9" y1="9" x2="15" y2="15"/>
                                    <line x1="15" y1="9" x2="9" y2="15"/>
                                </svg>
                            </div>
                            <p>No photos uploaded yet. Use the upload area above to add some!</p>
                        </div>
                    `;
                    return;
                }

                photoGrid.innerHTML = '';
                
                photos.forEach(photo => {
                    const card = document.createElement('div');
                    card.className = 'photo-card';
                    
                    // Prevent image caching by appending a small timestamp to the URL
                    const timestamp = new Date().getTime();
                    const photoUrl = `/photos/${encodeURIComponent(photo.name)}?thumb=true&t=${timestamp}`;
                    
                    card.innerHTML = `
                        <img class="photo-thumb" src="${photoUrl}" alt="${photo.name}" loading="lazy">
                        <div class="card-actions">
                            <button class="delete-btn" title="Delete Photo" onclick="deletePhoto('${photo.name.replace(/'/g, "\\'")}')">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                    <line x1="10" y1="11" x2="10" y2="17"/>
                                    <line x1="14" y1="11" x2="14" y2="17"/>
                                </svg>
                            </button>
                            <span class="photo-name">${photo.name}</span>
                        </div>
                    `;
                    
                    photoGrid.appendChild(card);
                });
            } catch (err) {
                showToast("Error updating photo catalog: " + err.message, "error");
            }
        }

        // 4. Delete Logic
        async function deletePhoto(filename) {
            if (!confirm(`Are you sure you want to delete "${filename}"?`)) return;
            
            try {
                const formData = new URLSearchParams();
                formData.append('name', filename);

                const response = await fetch('/api/delete', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: formData
                });

                if (response.ok) {
                    showToast(`Deleted ${filename}`, "success");
                    loadPhotos(); // Refresh grid
                } else {
                    const errMsg = await response.text();
                    throw new Error(errMsg || `Server returned ${response.status}`);
                }
            } catch (err) {
                showToast("Failed to delete image: " + err.message, "error");
            }
        }

        // Helper: Show custom toasts
        function showToast(message, type = "success") {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = '';
            if (type === 'success') {
                icon = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                `;
            } else {
                icon = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                `;
            }
            
            toast.innerHTML = `${icon} <span>${message}</span>`;
            toastContainer.appendChild(toast);
            
            // Auto remove toast after 3 seconds
            setTimeout(() => {
                toast.style.animation = 'toast-in 0.3s reverse forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
